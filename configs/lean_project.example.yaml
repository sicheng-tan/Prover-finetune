# Lean-interact verifier configuration (LocalProject mode).
# Use a local mathlib4 directory prepared by scripts/setup_mathlib4.py.

mathlib_path: external/mathlib4-v4.27.0
lean_version: v4.27.0
timeout_sec: 120

# Config-driven mathlib setup (used by scripts/setup_mathlib4.py)
mathlib_setup:
  repo_url: https://github.com/leanprover-community/mathlib4.git
  ref: v4.27.0
  clone_root: external
  # Final path will be: <repo_root>/<clone_root>/<dir_template.format(ref=ref)>
  dir_template: mathlib4-{ref}

# lean-interact server behavior
use_lean_interact: true
use_auto_server: true
memory_limit_mb: 16384
lean_interact_verbose: false

# Header used in Main.lean for proof checking.
header_imports:
  - Mathlib
header_set_options:
  - maxHeartbeats 200000
header_open_scopes:
  - BigOperators
  - Real
  - Nat
  - Topology
  - Rat

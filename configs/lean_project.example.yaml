# Lean project-level configuration for experiment checker rebuilds.
# You can point experiment config lean.project_config_path to this file.

project_dir: .lean_runner
lean_version: leanprover/lean4:v4.27.0
mathlib_ref: v4.27.0
package_name: runner

# Optional extra dependencies. Each item requires: name, git, ref.
extra_dependencies: []
# extra_dependencies:
#   - name: Cli
#     git: https://github.com/leanprover/lean4-cli
#     ref: v4.27.0

# Runtime options
timeout_sec: 120
lake_exe: lake
cache_get_timeout_sec: 300
use_lean_interact: true
# Optional memory cap for lean-interact (MB). null means unlimited.
memory_limit_mb: 16384
lean_interact_verbose: true

# Header used in Main.lean for proof checking.
header_imports:
  - Mathlib
header_set_options:
  - maxHeartbeats 200000
header_open_scopes:
  - BigOperators
  - Real
  - Nat
  - Topology
  - Rat

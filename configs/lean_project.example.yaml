# Lean verifier configuration.
# Default backend is Kimina server for high-concurrency proof checking.
# Keep lean-interact options as local fallback.

mathlib_path: external/mathlib4-v4.27.0
lean_version: v4.27.0
timeout_sec: 120

# Config-driven mathlib setup (used by scripts/setup_mathlib4.py)
mathlib_setup:
  repo_url: https://github.com/leanprover-community/mathlib4.git
  ref: v4.27.0
  clone_root: external
  # Final path will be: <repo_root>/<clone_root>/<dir_template.format(ref=ref)>
  dir_template: mathlib4-{ref}

# Choose verifier backend: kimina | lean_interact | auto
# - kimina: use kimina-lean-server client
# - lean_interact: use local lean-interact
# - auto: try kimina first, then fallback to lean-interact
verifier_backend: kimina

# kimina-lean-server client options
kimina_api_url: http://localhost:8000
kimina_api_key: null
kimina_http_timeout: 240
kimina_reuse: true
kimina_debug: false

# lean-interact fallback behavior
use_lean_interact: true
use_auto_server: true
memory_limit_mb: 16384
lean_interact_verbose: true

# Header prepended during verification only (not part of model prompt).
# Keep this minimal for Kimina stability: usually just `import Mathlib`.
header_imports:
  - Mathlib
header_set_options:
  - maxHeartbeats 0
# `open <namespace ...>` (default empty; add only when strictly needed)
header_open_namespaces: []

# `open scoped <scope ...>` (default empty; scope and namespace differ)
# Example when needed: [BigOperators]
header_open_scoped: []

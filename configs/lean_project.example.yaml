# Lean-interact verifier configuration (LocalProject mode).
# Use a local mathlib4 project directory (recommended as git submodule).

mathlib_path: mathlib4
lean_version: v4.27.0
timeout_sec: 120

# lean-interact server behavior
use_lean_interact: true
use_auto_server: true
memory_limit_mb: 16384
lean_interact_verbose: false

# Header used in Main.lean for proof checking.
header_imports:
  - Mathlib
header_set_options:
  - maxHeartbeats 200000
header_open_scopes:
  - BigOperators
  - Real
  - Nat
  - Topology
  - Rat

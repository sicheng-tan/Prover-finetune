experiment:
  name: minif2f-deepseek-prover-v2-7b-smoke-pass4
  split: test
  max_samples: 2
  pass_k: 4
  gpu_ids: [1,2]
  verbose_logging: true
  output_dir: outputs/experiments/minif2f-deepseek-prover-v2-7b-small-pass4

model:
  name_or_path: deepseek-ai/DeepSeek-Prover-V2-7B
  model_type: deepseek_prover_v2
  adapter_path: null
  require_gpu: true
  use_vllm: true
  inference_timeout_sec: 180
  max_new_tokens: 4096
  temperature: 0.7
  top_p: 0.95
  do_sample: true
  tensor_parallel_size: null  # null => use len(experiment.gpu_ids)
  gpu_memory_utilization: 0.8

minif2f:
  source_type: local_json
  json_path: data/processed/test.json
  jsonl_path: data/processed/test.jsonl
  root_dir: data/
  split_file: data/processed/test.txt

lean:
  project_config_path: configs/lean_project.example.yaml

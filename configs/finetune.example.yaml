model:
  name_or_path: Qwen/Qwen2.5-Math-7B-Instruct
  trust_remote_code: false
  use_4bit: true
  use_8bit: false
  lora:
    r: 32
    alpha: 64
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

data:
  source_type: huggingface
  dataset_name: AI-MO/NuminaMath-LEAN
  dataset_config: null
  train_split: train
  template: "{formal_ground_truth}"
  max_seq_length: 4096

training:
  output_dir: outputs/lora-qwen2.5-math-7b-bf16
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 8.0e-5
  logging_steps: 20
  save_steps: 200
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  bf16: true
  report_to: none
  seed: 42

model:
  name_or_path: deepseek-ai/DeepSeek-Prover-V2-7B
  trust_remote_code: false
  use_4bit: true
  use_8bit: false
  lora:
    r: 32
    alpha: 64
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

data:
  # Suggested DeepSeek-Prover-V2 workflow:
  # 1) Build filtered dataset: scripts/filter_numinamath_lean.py
  # 2) Extract reasoning/proof fields: scripts/extract_numinamath_reasoning.py
  source_type: jsonl
  train_path: data/processed/numinamath_lean_reasoning_train.jsonl
  formatter_type: deepseek_prover_v2
  formal_statement_field: formal_statement
  reasoning_steps_field: reasoning_steps
  proof_field: formal_proof_no_comments
  max_seq_length: 4396

training:
  output_dir: outputs/lora-qwen2.5-math-7b-bf16
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 8.0e-5
  logging_steps: 20
  save_steps: 200
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  bf16: true
  report_to: none
  seed: 42

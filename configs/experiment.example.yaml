experiment:
  name: minif2f-baseline
  split: valid
  max_samples: null
  pass_k: 1
  output_dir: outputs/experiments/minif2f-baseline

model:
  name_or_path: Qwen/Qwen2.5-Math-7B-Instruct
  # auto | generic | deepseek_prover_v2
  model_type: auto
  adapter_path: null
  device_map: auto
  max_new_tokens: 256
  temperature: 0.2
  top_p: 0.9
  do_sample: false

minif2f:
  source_type: local_json
  # Supported:
  # - local_json: provide json_path (processed miniF2F json array)
  # - local_jsonl: provide path with fields {id, statement, header?}
  # - local_lean_dir: provide root_dir and split_file
  json_path: data/processed/valid.json
  jsonl_path: data/processed/valid.jsonl
  root_dir: data/
  split_file: data/processed/valid.txt

lean:
  project_config_path: configs/lean_project.example.yaml

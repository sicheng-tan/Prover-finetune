experiment:
  name: minif2f-baseline
  split: valid
  max_samples: null
  pass_k: 1
  verbose_logging: true
  output_dir: outputs/experiments/minif2f-baseline

model:
  name_or_path: deepseek-ai/DeepSeek-Prover-V2-7B
  # auto | generic | deepseek_prover_v2
  model_type: deepseek_prover_v2
  adapter_path: null
  require_gpu: true
  use_vllm: true
  inference_timeout_sec: null
  max_new_tokens: 4096
  temperature: 0.2
  top_p: 0.9
  do_sample: false
  tensor_parallel_size: null  # null => use len(experiment.gpu_ids)
  gpu_memory_utilization: 0.85
  vllm_batch_size: 16
  lean_parallel_workers: null  # null => min(vllm_batch_size, cpu_count)
  dump_generated_lean_debug: true

minif2f:
  source_type: local_json
  # Supported:
  # - local_json: provide json_path (processed miniF2F json array)
  # - local_jsonl: provide path with fields {id, statement, header?}
  # - local_lean_dir: provide root_dir and split_file
  json_path: data/processed/valid.json
  jsonl_path: data/processed/valid.jsonl
  root_dir: data/
  split_file: data/processed/valid.txt

lean:
  project_config_path: configs/lean_project.example.yaml
